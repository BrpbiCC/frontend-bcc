<div class="page-container">
  <div class="page-header">
    <h2>Gestión de Activos</h2>
  </div>

  <!-- Search and Filters -->
  <app-view-search-filters></app-view-search-filters>

  <!-- Pestañas -->
  <div class="tabs-container">
    <button 
      class="tab-button" 
      [class.active]="activeTab === 'list'"
      (click)="setActiveTab('list')">
      Lista de Activos
    </button>
    <button 
      class="tab-button" 
      [class.active]="activeTab === 'create'"
      (click)="setActiveTab('create')">
      Registrar Activo
    </button>
  </div>

  <!-- Pestaña: Lista de Activos -->
  <div class="tab-content" *ngIf="activeTab === 'list'">
    <div class="table-container">
      <table class="data-table">
        <thead>
          <tr>
            <th>Código NFC</th>
            <th>Equipo</th>
            <th>Estado Actual</th>
            <th>Última Revisión</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let activo of activos; let i = index">
            <td><strong>{{ activo.codigo }}</strong></td>
            <td>{{ activo.equipo }}</td>
            <td>
              <span class="status-badge" [ngClass]="activo.estado.toLowerCase()">
                {{ activo.estado }}
              </span>
            </td>
            <td class="muted">{{ activo.ultimaRevision }}</td>
            <td>
              <div class="action-buttons">
                <button class="btn-action btn-edit" (click)="editActivo(i)" title="Editar activo">✏️</button>
                <button class="btn-action btn-delete" (click)="deleteActivo(i)" title="Eliminar activo">🗑️</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Pestaña: Crear/Editar Activo -->
  <div class="tab-content" *ngIf="activeTab === 'create'">
    <form class="create-form">
      <div class="form-header" *ngIf="isEditing">
        <p class="edit-notice">Editando activo NFC</p>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="codigo">Código NFC *</label>
          <div class="input-with-button">
            <input 
              type="text" 
              id="codigo" 
              [(ngModel)]="newActivo.codigo"
              name="codigo"
              placeholder="Ej: NFC-8472"
              required>
            <button type="button" class="btn-generate" (click)="generateCodigoAuto()" *ngIf="!isEditing" title="Generar código automático">
              🔄
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="estado">Estado</label>
          <select 
            id="estado" 
            [(ngModel)]="newActivo.estado"
            name="estado">
            <option *ngFor="let estado of estados" [value]="estado">{{ estado }}</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="equipo">Equipo Asociado *</label>
        <select 
          id="equipo" 
          [(ngModel)]="newActivo.equipo"
          name="equipo"
          required>
          <option value="">Seleccione un equipo</option>
          <option *ngFor="let equipo of equipos" [value]="equipo">{{ equipo }}</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-primary" (click)="createActivo()">
          {{ isEditing ? 'Actualizar Activo' : 'Registrar Activo' }}
        </button>
        <button type="button" class="btn-secondary" (click)="isEditing ? cancelEdit() : setActiveTab('list')">
          {{ isEditing ? 'Cancelar Edición' : 'Cancelar' }}
        </button>
      </div>
    </form>
  </div>
</div>
