<header class="topbar">
  <div class="topbar-content">

    <div class="user-actions">
      <div class="top-action-icons">
        <div class="notifications-container">
          <button
            class="btn-icon"
            title="Notificaciones"
            aria-label="Abrir notificaciones"
            [attr.aria-expanded]="showNotifications"
            (click)="toggleNotifications()"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span class="badge-dot" *ngIf="getUnreadCount() > 0"></span>
            <span class="badge-count" *ngIf="getUnreadCount() > 0">{{ getUnreadCount() }}</span>
          </button>

          <div class="notifications-dropdown" *ngIf="showNotifications" (clickOutside)="closeNotifications()">
            <div class="notifications-header">
              <h4>Notificaciones</h4>
              <button class="mark-read" (click)="markAllRead()">Marcar todo leído</button>
            </div>
            <div class="notifications-list" *ngIf="notifications.length > 0">
              <button
                type="button"
                class="notification-item"
                *ngFor="let notif of notifications"
                [class.unread]="!notif.read"
                (click)="openNotification(notif)"
              >
                <div class="notification-icon" [ngClass]="notif.type">
                  <svg *ngIf="notif.type === 'alert'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" /></svg>
                  <svg *ngIf="notif.type === 'success'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></svg>
                  <svg *ngIf="notif.type === 'info'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></svg>
                </div>
                <div class="notification-content">
                  <div class="notification-title">{{ notif.title }}</div>
                  <div class="notification-desc">{{ notif.message }}</div>
                  <div class="notification-time">{{ notif.time }}</div>
                </div>
              </button>
            </div>
            <div class="notifications-empty" *ngIf="notifications.length === 0">
              No hay notificaciones
            </div>
            <div class="notifications-footer" *ngIf="notifications.length > 0">
              <button type="button" class="view-all-notifications" (click)="goToNotificationsCenter()">Ver todas</button>
            </div>
          </div>
        </div>

        <div class="theme-container">
          <button class="btn-icon theme-toggle-btn" title="Cambiar tema" (click)="toggleTheme()">
          <!-- Sol (visible en tema claro) -->
          <svg
            *ngIf="!isDarkTheme"
            class="theme-icon sun-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>

          <!-- Luna (visible en tema oscuro) -->
            <svg *ngIf="isDarkTheme" class="theme-icon moon-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="user-profile-container">
        <button class="user-profile-trigger" type="button" (click)="toggleUserDropdown()">
          <div class="user-profile">
            <div class="avatar">{{ userInitials }}</div>
            <div class="user-info">
              <span class="user-name">{{ userName }}</span>
              <span class="user-role">{{ userRoleLabel }}</span>
            </div>
          </div>
        </button>

        <div class="user-dropdown" *ngIf="showUserDropdown" (clickOutside)="closeUserDropdown()">
          <button class="user-dropdown-item logout-item" type="button" (click)="logout()" aria-label="Cerrar sesión de forma segura">
            <span class="logout-icon-wrap" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
              </svg>
            </span>
            <span class="logout-copy">
              <span class="logout-label">Cerrar sesión</span>
              <span class="logout-hint">Salir de forma segura</span>
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
