<div class="page-container">
  <div class="page-header">
    <h2>Gestión de Personal</h2>
  </div>

  <!-- Search and Filters -->
  <app-view-search-filters></app-view-search-filters>

  <!-- Pestañas -->
  <div class="tabs-container">
    <button 
      class="tab-button" 
      [class.active]="activeTab === 'list'"
      (click)="setActiveTab('list')">
      Lista de Usuarios
    </button>
    <button 
      class="tab-button" 
      [class.active]="activeTab === 'create'"
      (click)="setActiveTab('create')">
      Crear Usuario
    </button>
  </div>

  <!-- Pestaña: Lista de Usuarios -->
  <div class="tab-content" *ngIf="activeTab === 'list'">
    <div class="load-error" *ngIf="loadError">{{ loadError }}</div>
    <div class="load-error" *ngIf="actionError">{{ actionError }}</div>

    <div class="table-container">
      <div class="table-scroll">
        <table class="data-table">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let usuario of usuarios; let i = index">
              <td>{{ usuario.name }}</td>
              <td>{{ usuario.roleLabel }}</td>
              <td>
                <span class="badge" [class.active]="usuario.status === 'Activo'" [class.inactive]="usuario.status === 'Inactivo'">
                  {{ usuario.status }}
                </span>
              </td>
              <td>
                <div class="action-buttons">
                  <button
                    class="btn-action btn-edit"
                    (click)="editUsuario(i)"
                    [disabled]="isCreating || deletingUserId === usuario.id"
                    title="Editar usuario">
                    ✏️
                  </button>
                  <button
                    class="btn-action btn-delete"
                    (click)="deleteUsuario(i)"
                    [disabled]="isCreating || deletingUserId === usuario.id"
                    title="Desactivar usuario">
                    {{ deletingUserId === usuario.id ? '...' : '🗑️' }}
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Pestaña: Crear/Editar Usuario -->
  <div class="tab-content" *ngIf="activeTab === 'create'">
    <form class="create-form">
      <div class="form-header" *ngIf="isEditing">
        <p class="edit-notice">Editando usuario</p>
      </div>

      <div class="load-error" *ngIf="createError">{{ createError }}</div>

      <div class="form-group">
        <label for="name">Nombre Completo *</label>
        <input 
          type="text" 
          id="name" 
          [(ngModel)]="newUsuario.name"
          name="name"
          placeholder="Ingrese nombre completo"
          required>
      </div>

      <div class="form-group">
        <label for="email">Email *</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="newUsuario.email"
          name="email"
          placeholder="usuario@empresa.com"
          required>
      </div>

      <div class="form-group" *ngIf="!isEditing">
        <label for="password">Password *</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="newUsuario.password"
          name="password"
          placeholder="Ingresa contraseña"
          required>
      </div>

      <div class="form-group">
        <label for="phone">Teléfono *</label>
        <input
          type="tel"
          id="phone"
          [(ngModel)]="newUsuario.phone"
          name="phone"
          placeholder="+56998765432"
          required>
      </div>

      <div class="form-group">
        <label for="role">Rol *</label>
        <select 
          id="role" 
          [(ngModel)]="newUsuario.role"
          name="role"
          required>
          <option value="">Seleccione un rol</option>
          <option *ngFor="let role of roles" [value]="role">{{ getRoleLabel(role) }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="status">Estado</label>
        <select 
          id="status" 
          [(ngModel)]="newUsuario.status"
          name="status">
          <option value="Activo">Activo</option>
          <option value="Inactivo">Inactivo</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-primary" (click)="createUsuario()" [disabled]="isCreating">
          {{ isCreating ? (isEditing ? 'Actualizando...' : 'Creando...') : (isEditing ? 'Actualizar Usuario' : 'Crear Usuario') }}
        </button>
        <button type="button" class="btn-secondary" (click)="isEditing ? cancelEdit() : setActiveTab('list')">
          {{ isEditing ? 'Cancelar Edición' : 'Cancelar' }}
        </button>
      </div>
    </form>
  </div>
</div>
