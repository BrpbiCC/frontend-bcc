<div class="mobile-topbar-overlay" (click)="onClose()"></div>

<div class="mobile-topbar">
  <!-- Header -->
  <div class="mobile-header">
    <button class="close-btn" (click)="onClose()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </div>

  <div class="mobile-user-profile">
    <div class="avatar">{{ userInitials }}</div>
    <div class="mobile-user-info">
      <div class="mobile-user-head">
        <span class="user-name">{{ userName }}</span>
        <button
          class="inline-theme-chip"
          type="button"
          (click)="toggleTheme()"
          [attr.aria-label]="isDarkTheme ? 'Cambiar a tema claro' : 'Cambiar a tema oscuro'"
          title="Cambiar tema"
        >
          <svg
            *ngIf="!isDarkTheme"
            class="theme-icon sun-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg *ngIf="isDarkTheme" class="theme-icon moon-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
      <span class="user-role">{{ userRoleLabel }}</span>
    </div>
  </div>

  <div class="mobile-menu-list">

    <!-- Notifications Section -->
    <div class="mobile-section">
      <button class="mobile-menu-item" (click)="toggleNotifications()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
        <span>Notificaciones</span>
        <span class="badge" *ngIf="getUnreadCount() > 0">{{ getUnreadCount() }}</span>
        <svg class="chevron" [class.open]="showNotifications" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </button>

      <div class="mobile-notifications-panel" *ngIf="showNotifications">
        <button class="mark-read-btn" (click)="markAllRead()">Marcar todo leído</button>

        <div class="notification-list" *ngIf="notifications.length > 0">
          <div class="notification-item" *ngFor="let notif of notifications" [class.unread]="!notif.read">
            <div class="notif-icon" [ngClass]="notif.type">
              <svg *ngIf="notif.type === 'alert'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                <line x1="12" y1="9" x2="12" y2="13" />
                <line x1="12" y1="17" x2="12.01" y2="17" />
              </svg>
              <svg *ngIf="notif.type === 'success'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                <polyline points="22 4 12 14.01 9 11.01" />
              </svg>
              <svg *ngIf="notif.type === 'info'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="16" x2="12" y2="12" />
                <line x1="12" y1="8" x2="12.01" y2="8" />
              </svg>
            </div>
            <div class="notif-content">
              <div class="notif-title">{{ notif.title }}</div>
              <div class="notif-message">{{ notif.message }}</div>
              <div class="notif-time">{{ notif.time }}</div>
            </div>
          </div>
        </div>

        <div class="empty-notifications" *ngIf="notifications.length === 0">
          No hay notificaciones
        </div>
      </div>
    </div>

  </div>

  <div class="mobile-session-actions">
    <button class="mobile-logout-btn" type="button" (click)="logout()" aria-label="Cerrar sesión">
      <span class="mobile-logout-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </span>
      <span class="mobile-logout-copy">
        <span class="mobile-logout-label">Cerrar sesión</span>
        <span class="mobile-logout-sub">Salir de forma segura</span>
      </span>
    </button>
  </div>
</div>
